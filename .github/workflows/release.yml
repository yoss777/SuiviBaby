name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - ios
          - android
      submit:
        description: "Submit to stores after build"
        required: true
        default: false
        type: boolean

jobs:
  # Step 1: Quality gate — lint, typecheck, test
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run app tests
        run: npm test -- --ci

      - name: Run CF tests
        run: npm run test:functions -- --ci

  # Step 2: Build production
  build:
    name: Build Production
    needs: quality
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.platform != 'all' && fromJSON(format('["{0}"]', github.event.inputs.platform)) || fromJSON('["ios", "android"]') }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: npm ci

      - name: Build production (${{ matrix.platform }})
        run: eas build --profile production --platform ${{ matrix.platform }} --non-interactive --no-wait

  # Step 3: Submit to stores (optional)
  submit:
    name: Submit to Stores
    needs: build
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.submit == 'true')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.platform != 'all' && fromJSON(format('["{0}"]', github.event.inputs.platform)) || fromJSON('["ios", "android"]') }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: npm ci

      - name: Submit to store (${{ matrix.platform }})
        run: eas submit --platform ${{ matrix.platform }} --latest --non-interactive

  # Step 4: Sync Firestore app_config/latest_version (on tag push, after submit)
  # Ensures the in-app update banner is triggered for users still on the
  # previous version. Only runs after a successful store submit on a tag push.
  sync-app-config:
    name: Sync Firestore app_config
    needs: submit
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required for git tag annotation lookup

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Extract release notes from tag annotation
        id: notes
        run: |
          NOTES=$(git tag -l --format='%(contents)' "${GITHUB_REF_NAME}")
          if [ -z "$NOTES" ]; then
            NOTES=$(git log -1 --pretty=format:'%s')
          fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Update Firestore app_config/latest_version
        run: npm run update-app-config
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          RELEASE_NOTES: ${{ steps.notes.outputs.notes }}

  # Step 5: Deploy Cloud Functions (on tag push)
  deploy-functions:
    name: Deploy Cloud Functions
    needs: quality
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install function dependencies
        run: cd functions && npm ci

      - name: Deploy Functions & Rules
        uses: w9jds/firebase-action@v13.22.1
        with:
          args: deploy --only functions,firestore:rules,firestore:indexes
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
