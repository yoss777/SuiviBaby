name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - ios
          - android
      submit:
        description: "Submit to stores after build"
        required: true
        default: false
        type: boolean

jobs:
  # Step 1: Quality gate — lint, typecheck, test
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run app tests
        run: npm test -- --ci

      - name: Run CF tests
        run: npm run test:functions -- --ci

  # Step 2: Build production
  build:
    name: Build Production
    needs: quality
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.platform != 'all' && fromJSON(format('["{0}"]', github.event.inputs.platform)) || fromJSON('["ios", "android"]') }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: npm ci

      - name: Build production (${{ matrix.platform }})
        run: eas build --profile production --platform ${{ matrix.platform }} --non-interactive --no-wait

  # Step 3: Submit to stores (optional)
  submit:
    name: Submit to Stores
    needs: build
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.submit == 'true')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.platform != 'all' && fromJSON(format('["{0}"]', github.event.inputs.platform)) || fromJSON('["ios", "android"]') }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: npm ci

      - name: Submit to store (${{ matrix.platform }})
        run: eas submit --platform ${{ matrix.platform }} --latest --non-interactive

  # Step 4: Deploy Cloud Functions (on tag push)
  deploy-functions:
    name: Deploy Cloud Functions
    needs: quality
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install function dependencies
        run: cd functions && npm ci

      - name: Deploy Functions & Rules
        uses: w9jds/firebase-action@v13.22.1
        with:
          args: deploy --only functions,firestore:rules,firestore:indexes
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
